<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PriAxom AIR Eye</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@700&display=swap');

        body, html {
            margin: 0; padding: 0; width: 100vw; height: 100vh;
            background-color: #000; overflow: hidden;
            font-family: 'Courier New', Courier, monospace;
        }
        #output_canvas {
            display: block; width: 100vw; height: 100vh;
            transform: scaleX(-1); /* Mirror camera */
        }
        #hud {
            position: absolute; top: 20px; left: 20px;
            pointer-events: none; z-index: 10;
        }
        h1 { 
            margin: 0; font-family: 'Outfit', sans-serif; font-size: 36px; letter-spacing: 1px;
            background: linear-gradient(90deg, #4285F4, #EA4335, #FBBC05, #34A853);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px rgba(255,255,255,0.1);
        }
        p { margin: 5px 0 0 0; font-size: 14px; color: #00ffff; text-shadow: 0 0 10px #00ffff; opacity: 0.9; }
        .video-feed { display: none; }
    </style>
</head>
<body>

    <div id="hud">
        <h1>PriAxom AIR Eye</h1>
        <p>System Active // Face, Hand & Voice Tracking Engaged</p>
        <p id="status_text">State: IDLE</p>
        <p id="mic_status">Mic: INITIALIZING...</p>
    </div>

    <video class="video-feed" id="input_video" autoplay playsinline></video>
    <canvas id="output_canvas"></canvas>

    <script>
        const videoElement = document.getElementById('input_video');
        const canvasElement = document.getElementById('output_canvas');
        const canvasCtx = canvasElement.getContext('2d');
        const statusText = document.getElementById('status_text');
        const micStatus = document.getElementById('mic_status');

        // Matrix Indices
        const LEFT_EYE = [33, 160, 158, 133, 153, 144];
        const RIGHT_EYE = [362, 385, 387, 263, 373, 380];
        const IRIS_L = 468;
        const IRIS_R = 473;
        const MOUTH_INNER = { top: 13, bottom: 14, left: 78, right: 308 };

        // System State
        let isDrawing = false;
        let paths = []; // Stores all drawn lines
        let currentPath = [];
        let currentGaze = { x: 0, y: 0 };
        
        // Mouth Toggle Logic
        let isMouthOpen = false;
        const MAR_THRESHOLD = 0.5; // Mouth Aspect Ratio opening threshold
        
        // Pinch & Translation Logic
        let isPinching = false;
        let lastPinchPos = { x: 0, y: 0 };
        const PINCH_THRESHOLD = 0.05; // Relative distance between thumb and index

        function resizeCanvas() {
            canvasElement.width = window.innerWidth;
            canvasElement.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // 1. Voice Command Subsystem
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (SpeechRecognition) {
            const recognition = new SpeechRecognition();
            recognition.continuous = true;
            recognition.interimResults = true; // High sensitivity
            
            recognition.onstart = () => { micStatus.innerText = "Mic: LISTENING (Say 'Clear')"; };
            recognition.onresult = (event) => {
                for (let i = event.resultIndex; i < event.results.length; ++i) {
                    const transcript = event.results[i][0].transcript.toLowerCase();
                    if (transcript.includes("clear")) {
                        paths = [];
                        currentPath = [];
                        console.log("Canvas Cleared via Voice");
                    }
                }
            };
            recognition.onerror = (e) => { micStatus.innerText = "Mic: ERROR - " + e.error; };
            recognition.onend = () => { recognition.start(); }; // Keep listening
            recognition.start();
        } else {
            micStatus.innerText = "Mic: UNAVAILABLE (Browser not supported)";
        }

        // 2. Geometric Mathematics Subsystems
        function getMAR(landmarks) {
            const dist = (pA, pB) => Math.hypot(pA.x - pB.x, pA.y - pB.y);
            const v = dist(landmarks[MOUTH_INNER.top], landmarks[MOUTH_INNER.bottom]);
            const h = dist(landmarks[MOUTH_INNER.left], landmarks[MOUTH_INNER.right]);
            return v / h;
        }

        function calculatePinchDistance(thumbTip, indexTip) {
            return Math.hypot(thumbTip.x - indexTip.x, thumbTip.y - indexTip.y);
        }

        // 3. Rendering Subsystems
        function drawSkeleton(landmarks, indices, color) {
            canvasCtx.beginPath();
            canvasCtx.strokeStyle = color;
            canvasCtx.lineWidth = 1;
            canvasCtx.shadowBlur = 5;
            canvasCtx.shadowColor = color;
            for (let i = 0; i < indices.length; i++) {
                const pt = landmarks[indices[i]];
                const x = pt.x * canvasElement.width;
                const y = pt.y * canvasElement.height;
                if (i === 0) canvasCtx.moveTo(x, y);
                else canvasCtx.lineTo(x, y);
            }
            canvasCtx.closePath();
            canvasCtx.stroke();
            canvasCtx.shadowBlur = 0;
        }

        function drawPaths() {
            canvasCtx.strokeStyle = "#4285F4";
            canvasCtx.lineWidth = 3;
            canvasCtx.shadowBlur = 10;
            canvasCtx.shadowColor = "#4285F4";

            paths.forEach(path => {
                if (path.length < 2) return;
                canvasCtx.beginPath();
                canvasCtx.moveTo(path[0].x, path[0].y);
                for (let i = 1; i < path.length; i++) {
                    canvasCtx.lineTo(path[i].x, path[i].y);
                }
                canvasCtx.stroke();
            });
            canvasCtx.shadowBlur = 0;

            // Draw current gaze cursor
            canvasCtx.fillStyle = isDrawing ? "#34A853" : "#EA4335"; // Green if drawing, Red if idle
            canvasCtx.beginPath();
            canvasCtx.arc(currentGaze.x, currentGaze.y, 5, 0, 2 * Math.PI);
            canvasCtx.fill();
        }

        // 4. Face Processing Loop
        function onFaceResults(results) {
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);

            if (results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0) {
                const landmarks = results.multiFaceLandmarks[0];

                drawSkeleton(landmarks, LEFT_EYE, 'rgba(0, 255, 255, 0.5)');
                drawSkeleton(landmarks, RIGHT_EYE, 'rgba(0, 255, 255, 0.5)');

                // Update Gaze
                const irisL = landmarks[IRIS_L];
                const irisR = landmarks[IRIS_R];
                currentGaze = {
                    x: ((irisL.x + irisR.x) / 2) * canvasElement.width,
                    y: ((irisL.y + irisR.y) / 2) * canvasElement.height
                };

                // Mouth Toggle Logic
                const currentMAR = getMAR(landmarks);
                if (currentMAR > MAR_THRESHOLD) {
                    isMouthOpen = true;
                } else if (currentMAR < MAR_THRESHOLD * 0.7 && isMouthOpen) {
                    // Mouth closed after being open -> Toggle State
                    isMouthOpen = false;
                    isDrawing = !isDrawing;
                    
                    if (isDrawing) {
                        currentPath = [{ x: currentGaze.x, y: currentGaze.y }];
                        paths.push(currentPath);
                        statusText.innerText = "State: DRAWING (Continuous)";
                    } else {
                        statusText.innerText = "State: IDLE";
                    }
                }

                // Add to path if drawing
                if (isDrawing && currentPath) {
                    currentPath.push({ x: currentGaze.x, y: currentGaze.y });
                }
            }
            drawPaths();
        }

        // 5. Hand Processing Loop
        function onHandResults(results) {
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const landmarks = results.multiHandLandmarks[0];
                const thumbTip = landmarks[4];
                const indexTip = landmarks[8];
                
                const distance = calculatePinchDistance(thumbTip, indexTip);
                
                const pinchScreenX = ((thumbTip.x + indexTip.x) / 2) * canvasElement.width;
                const pinchScreenY = ((thumbTip.y + indexTip.y) / 2) * canvasElement.height;

                if (distance < PINCH_THRESHOLD) {
                    if (!isPinching) {
                        isPinching = true;
                        lastPinchPos = { x: pinchScreenX, y: pinchScreenY };
                        statusText.innerText = "State: PANNING (Pinch Detected)";
                    } else {
                        // Calculate Translation Delta
                        const dx = pinchScreenX - lastPinchPos.x;
                        const dy = pinchScreenY - lastPinchPos.y;

                        // Apply Delta to all paths
                        paths.forEach(path => {
                            path.forEach(point => {
                                point.x += dx;
                                point.y += dy;
                            });
                        });
                        lastPinchPos = { x: pinchScreenX, y: pinchScreenY };
                    }
                } else {
                    if (isPinching) {
                        isPinching = false;
                        statusText.innerText = isDrawing ? "State: DRAWING" : "State: IDLE";
                    }
                }
            }
        }

        // Initialize Neural Networks
        const faceMesh = new FaceMesh({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`});
        faceMesh.setOptions({ maxNumFaces: 1, refineLandmarks: true, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
        faceMesh.onResults(onFaceResults);

        const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
        hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
        hands.onResults(onHandResults);

        // Unified Camera Feed Execution
        const camera = new Camera(videoElement, {
            onFrame: async () => {
                // Execute models sequentially per frame to avoid pipeline collision
                await faceMesh.send({image: videoElement});
                await hands.send({image: videoElement});
            },
            width: 1280, height: 720
        });
        camera.start();
    </script>
</body>
</html>
