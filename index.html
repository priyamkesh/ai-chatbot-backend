<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PriAxom AIR Eye</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@700&display=swap');

        body, html {
            margin: 0; padding: 0; width: 100vw; height: 100vh;
            background-color: #000; overflow: hidden;
            font-family: 'Courier New', Courier, monospace;
        }
        #output_canvas {
            display: block; width: 100vw; height: 100vh;
            transform: scaleX(-1); /* Mirror camera */
        }
        #hud {
            position: absolute; top: 20px; left: 20px;
            pointer-events: none; z-index: 10;
        }
        h1 { 
            margin: 0; 
            font-family: 'Outfit', sans-serif;
            font-size: 36px; 
            letter-spacing: 1px;
            /* Google Color Gradient */
            background: linear-gradient(90deg, #4285F4, #EA4335, #FBBC05, #34A853);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px rgba(255,255,255,0.1);
        }
        p { margin: 5px 0 0 0; font-size: 14px; color: #00ffff; text-shadow: 0 0 10px #00ffff; opacity: 0.9; }
        .video-feed { display: none; }
    </style>
</head>
<body>

    <div id="hud">
        <h1>PriAxom AIR Eye</h1>
        <p>System Active // Gaze tracking engaged</p>
        <p id="status_text">State: IDLE</p>
    </div>

    <video class="video-feed" id="input_video" autoplay playsinline></video>
    <canvas id="output_canvas"></canvas>

    <script>
        const videoElement = document.getElementById('input_video');
        const canvasElement = document.getElementById('output_canvas');
        const canvasCtx = canvasElement.getContext('2d');
        const statusText = document.getElementById('status_text');

        // MediaPipe Landmarks
        const LEFT_EYE = [33, 160, 158, 133, 153, 144];
        const RIGHT_EYE = [362, 385, 387, 263, 373, 380];
        const IRIS_L = 468;
        const IRIS_R = 473;

        // System State
        let drawingState = 'IDLE'; 
        let anchorPoints = [];
        let currentGaze = { x: 0, y: 0 };
        
        // Blink Mechanics
        let blinkStartTime = 0;
        let isEyesClosed = false;
        let lastShortBlinkTime = 0;
        const EAR_THRESHOLD = 0.18; // Corrected threshold for standard detection
        const LONG_BLINK_MS = 500;
        const DOUBLE_BLINK_MS = 400;

        function resizeCanvas() {
            canvasElement.width = window.innerWidth;
            canvasElement.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        function getEAR(landmarks, eye) {
            const dist = (pA, pB) => Math.hypot(pA.x - pB.x, pA.y - pB.y);
            const v1 = dist(landmarks[eye[1]], landmarks[eye[5]]);
            const v2 = dist(landmarks[eye[2]], landmarks[eye[4]]);
            const h = dist(landmarks[eye[0]], landmarks[eye[3]]);
            return (v1 + v2) / (2.0 * h);
        }

        function drawSkeleton(landmarks, indices, color) {
            canvasCtx.beginPath();
            canvasCtx.strokeStyle = color;
            canvasCtx.lineWidth = 1;
            canvasCtx.shadowBlur = 5;
            canvasCtx.shadowColor = color;
            for (let i = 0; i < indices.length; i++) {
                const pt = landmarks[indices[i]];
                const x = pt.x * canvasElement.width;
                const y = pt.y * canvasElement.height;
                if (i === 0) canvasCtx.moveTo(x, y);
                else canvasCtx.lineTo(x, y);
            }
            canvasCtx.closePath();
            canvasCtx.stroke();
            canvasCtx.shadowBlur = 0;
        }

        function drawLines() {
            if (anchorPoints.length > 0) {
                canvasCtx.beginPath();
                canvasCtx.strokeStyle = "#4285F4"; // Google Blue line
                canvasCtx.lineWidth = 3;
                canvasCtx.shadowBlur = 10;
                canvasCtx.shadowColor = "#4285F4";

                canvasCtx.moveTo(anchorPoints[0].x, anchorPoints[0].y);
                for (let i = 1; i < anchorPoints.length; i++) {
                    canvasCtx.lineTo(anchorPoints[i].x, anchorPoints[i].y);
                }

                if (drawingState === 'DRAWING') {
                    canvasCtx.lineTo(currentGaze.x, currentGaze.y);
                }
                canvasCtx.stroke();
                
                canvasCtx.fillStyle = "#FBBC05"; // Google Yellow points
                anchorPoints.forEach(pt => {
                    canvasCtx.beginPath();
                    canvasCtx.arc(pt.x, pt.y, 5, 0, 2 * Math.PI);
                    canvasCtx.fill();
                });
                canvasCtx.shadowBlur = 0;
            }
        }

        function drawGazeCursor(now) {
            // Draw center tracking dot
            canvasCtx.fillStyle = "#EA4335"; // Google Red cursor
            canvasCtx.beginPath();
            canvasCtx.arc(currentGaze.x, currentGaze.y, 4, 0, 2 * Math.PI);
            canvasCtx.fill();

            // Draw loading ring if blinking
            if (isEyesClosed) {
                const elapsed = now - blinkStartTime;
                const progress = Math.min(elapsed / LONG_BLINK_MS, 1);
                
                canvasCtx.beginPath();
                canvasCtx.strokeStyle = progress === 1 ? "#34A853" : "#EA4335"; // Green if ready, Red if loading
                canvasCtx.lineWidth = 3;
                canvasCtx.arc(currentGaze.x, currentGaze.y, 20, -0.5 * Math.PI, (-0.5 + 2 * progress) * Math.PI);
                canvasCtx.stroke();
            }
        }

        function processLogic(ear) {
            const now = Date.now();

            if (ear < EAR_THRESHOLD) {
                if (!isEyesClosed) {
                    isEyesClosed = true;
                    blinkStartTime = now;
                }
            } else {
                if (isEyesClosed) {
                    const blinkDuration = now - blinkStartTime;
                    isEyesClosed = false;

                    // It was a long blink (Drop Point)
                    if (blinkDuration >= LONG_BLINK_MS) {
                        drawingState = 'DRAWING';
                        anchorPoints.push({ x: currentGaze.x, y: currentGaze.y });
                        statusText.innerText = `State: DRAWING (${anchorPoints.length} points)`;
                    } 
                    // It was a short blink
                    else {
                        const timeSinceLastShort = now - lastShortBlinkTime;
                        // Double Blink Detected (Stop Drawing)
                        if (timeSinceLastShort < DOUBLE_BLINK_MS) {
                            drawingState = 'IDLE';
                            statusText.innerText = "State: IDLE (Drawing Stopped)";
                            lastShortBlinkTime = 0; // Reset
                        } else {
                            lastShortBlinkTime = now;
                        }
                    }
                }
            }
            drawGazeCursor(now);
        }

        function onResults(results) {
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);

            if (results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0) {
                const landmarks = results.multiFaceLandmarks[0];

                drawSkeleton(landmarks, LEFT_EYE, 'rgba(0, 255, 255, 0.5)');
                drawSkeleton(landmarks, RIGHT_EYE, 'rgba(0, 255, 255, 0.5)');

                // Calculate exact midpoint between both irises
                const irisL = landmarks[IRIS_L];
                const irisR = landmarks[IRIS_R];
                
                currentGaze = {
                    x: ((irisL.x + irisR.x) / 2) * canvasElement.width,
                    y: ((irisL.y + irisR.y) / 2) * canvasElement.height
                };

                const leftEAR = getEAR(landmarks, LEFT_EYE);
                const rightEAR = getEAR(landmarks, RIGHT_EYE);
                const avgEAR = (leftEAR + rightEAR) / 2;

                processLogic(avgEAR);
            }
            drawLines();
        }

        const faceMesh = new FaceMesh({locateFile: (file) => {
            return `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`;
        }});
        faceMesh.setOptions({
            maxNumFaces: 1, refineLandmarks: true,
            minDetectionConfidence: 0.5, minTrackingConfidence: 0.5
        });
        faceMesh.onResults(onResults);

        const camera = new Camera(videoElement, {
            onFrame: async () => { await faceMesh.send({image: videoElement}); },
            width: 1280, height: 720
        });
        camera.start();
    </script>
</body>
</html>
