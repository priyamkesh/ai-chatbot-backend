<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PriAxom AIR Eye</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap');

        body, html {
            margin: 0; padding: 0; width: 100vw; height: 100vh;
            background-color: #000; overflow: hidden;
            font-family: 'Courier New', Courier, monospace;
        }
        #output_canvas {
            display: block; width: 100vw; height: 100vh;
            transform: scaleX(-1); /* Default selfie view, will toggle in JS */
        }
        
        /* Simplified header HUD based on user request and image */
        #header-hud {
            position: absolute; top: 20px; left: 20px;
            pointer-events: none; z-index: 10;
        }
        .minimal-title {
            margin: 0; font-family: 'Outfit', sans-serif; font-size: 36px; letter-spacing: 1px;
            /* Purple gradient for title from image */
            background: linear-gradient(90deg, #8a2be2, #4b0082);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .byline {
            margin: 5px 0 0 0; font-family: 'Outfit', sans-serif; font-size: 14px; 
            color: #ffffff; opacity: 0.9; letter-spacing: 0.5px;
        }
        
        /* Minimal top-right controls container */
        .top-right-controls {
            position: absolute; top: 20px; right: 20px; z-index: 20;
            display: flex; gap: 15px; align-items: center;
        }
        .top-right-controls button {
            background: transparent; border: 1px solid rgba(255, 255, 255, 0.1);
            color: transparent; /* For gradient text clip */
            font-family: 'Outfit', sans-serif; font-size: 14px;
            padding: 8px 16px; cursor: pointer; transition: all 0.2s ease;
            text-transform: uppercase; letter-spacing: 1px;
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        
        /* Cyan-to-yellow gradient for CAM text as requested */
        #toggle_cam_hud {
            background: linear-gradient(90deg, #00ffff, #ffff00);
            border-color: rgba(0, 255, 255, 0.2);
        }
        
        /* Active state for CAM button: fill gradient, black text for contrast */
        #toggle_cam_hud.active {
            background: linear-gradient(90deg, #00ffff, #ffff00);
            -webkit-background-clip: initial; -webkit-text-fill-color: #000;
            color: #000;
        }
        
        /* Simple white text style for "<>" button */
        #switch_cam_hud {
            -webkit-background-clip: initial; -webkit-text-fill-color: #ffffff;
            color: #ffffff;
            border-color: rgba(255, 255, 255, 0.2);
        }
        
        /* Hide existing HUD text elements from screen but keep statusText for JS dependencies */
        #old-hud-elements { display: none; }
        
        .video-feed { display: none; }
    </style>
</head>
<body>

    <div id="header-hud">
        <h1 class="minimal-title">PriAxom AIR Eye©</h1>
        <p class="byline">By Priyam Kesh</p>
    </div>
    
    <div id="old-hud-elements">
        <h1 style="display: none;">PriAxom AIR Eye</h1>
        <p style="display: none;">System Active // Engine: GPU Desynchronized + Alpha Core</p>
        <p id="status_text" style="display: none;">State: IDLE | Color: BLUE</p>
    </div>
    
    <div class="top-right-controls">
        <button id="toggle_cam_hud">CAM</button>
        <button id="switch_cam_hud">&lt;&gt;</button>
    </div>

    <video class="video-feed" id="input_video" autoplay playsinline></video>
    <canvas id="output_canvas"></canvas>

    <script>
        const videoElement = document.getElementById('input_video');
        const canvasElement = document.getElementById('output_canvas');
        
        // GPU Desynchronization
        const canvasCtx = canvasElement.getContext('2d', { desynchronized: true, alpha: false });
        const statusText = document.getElementById('status_text'); // Kept for safety, hidden

        // New HUD elements
        const toggleCamHudBtn = document.getElementById('toggle_cam_hud');
        const switchCamHudBtn = document.getElementById('switch_cam_hud');
        
        // MediaPipe setup is kept identical for zero performance impact
        // Pre-calculated contours and hands skeleton matrix, unchanged.
        // multi-color state machine logic, speech sub-system, math utils, unchanged.

        // Standard Perfect Eye Contours (Seamless Loops)
        const LEFT_EYE_CONTOUR = [33, 7, 163, 144, 145, 153, 154, 155, 133, 173, 157, 158, 159, 160, 161, 246];
        const RIGHT_EYE_CONTOUR = [362, 382, 381, 380, 374, 373, 390, 249, 263, 466, 388, 387, 386, 385, 384, 398];
        const IRIS_L = 468;
        const IRIS_R = 473;
        const MOUTH_INNER = { top: 13, bottom: 14, left: 78, right: 308 };
        
        // Image-Accurate Hand Skeleton Matrix
        const HAND_CONNECTIONS = [
            [0, 1, 2, 3, 4],    // Thumb
            [0, 5, 6, 7, 8],    // Index 
            [9, 10, 11, 12],    // Middle
            [13, 14, 15, 16],   // Ring
            [0, 17, 18, 19, 20],// Pinky
            [5, 9, 13, 17]      // Knuckles
        ];

        let cw = 0, ch = 0;

        // multi-color state machine
        let isDrawing = false;
        let paths = []; 
        let currentPath = null;
        let currentPenColor = "#00a2ff"; // Default Blue
        let colorName = "BLUE";
        const currentGaze = { x: 0, y: 0 };
        
        let currentFaceLandmarks = null;
        let currentHandLandmarks = null;
        
        let isMouthOpen = false;
        const MAR_THRESHOLD = 0.15; 
        
        let isPinching = false;
        const lastPinchPos = { x: 0, y: 0 };
        const PINCH_THRESHOLD_SQ = 0.0025; 

        // New camera facing logic
        let currentCameraFacing = "user"; // "user" (front), "environment" (back)
        let camera = null; // Reassignable variable

        function resizeCanvas() {
            cw = window.innerWidth;
            ch = window.innerHeight;
            canvasElement.width = cw;
            canvasElement.height = ch;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        function setColor(hex, name) {
            if (currentPenColor === hex) return;
            currentPenColor = hex;
            colorName = name;
            // updateStatus(); // Existing status updates removed from main logic for performance, handled behind scenes by old logic
            // statusText updates kept for safety, but make sure they don't break logic.
            statusText.innerText = `State: ${isDrawing ? 'DRAWING' : 'IDLE'} | Color: ${colorName}`;
            
            if (isDrawing) {
                currentPath = { color: currentPenColor, points: [] };
                paths.push(currentPath);
            }
        }

        // Voice Command subsystem
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (SpeechRecognition) {
            const recognition = new SpeechRecognition();
            recognition.continuous = true;
            recognition.interimResults = true;
            recognition.onresult = (event) => {
                const transcript = event.results[event.results.length - 1][0].transcript.toLowerCase();
                
                if (transcript.includes("clear")) { paths.length = 0; currentPath = null; }
                else if (transcript.includes("red")) setColor("#ff0000", "RED");
                else if (transcript.includes("blue")) setColor("#00a2ff", "BLUE");
                else if (transcript.includes("green")) setColor("#00ff00", "GREEN");
                else if (transcript.includes("yellow")) setColor("#ffff00", "YELLOW");
                else if (transcript.includes("pink")) setColor("#ff00ff", "PINK");
                else if (transcript.includes("white")) setColor("#ffffff", "WHITE");
            };
            recognition.onend = () => { recognition.start(); };
            recognition.start();
        }

        // Fast Math
        const getDistSq = (pA, pB) => {
            const dx = pA.x - pB.x;
            const dy = pA.y - pB.y;
            return (dx * dx) + (dy * dy);
        };
        const getDist = (pA, pB) => Math.sqrt(getDistSq(pA, pB));

        // existing logic remains unchanged for face and hands processing pipeline.
        
        // pipeline: face
        function onFaceResults(results) {
            currentFaceLandmarks = results.multiFaceLandmarks?.[0] || null;

            if (currentFaceLandmarks) {
                const irisL = currentFaceLandmarks[IRIS_L];
                const irisR = currentFaceLandmarks[IRIS_R];
                
                currentGaze.x = ((irisL.x + irisR.x) / 2) * cw;
                currentGaze.y = ((irisL.y + irisR.y) / 2) * ch;

                const currentMAR = getDist(currentFaceLandmarks[MOUTH_INNER.top], currentFaceLandmarks[MOUTH_INNER.bottom]) / 
                                   getDist(currentFaceLandmarks[MOUTH_INNER.left], currentFaceLandmarks[MOUTH_INNER.right]);
                
                if (currentMAR > MAR_THRESHOLD) {
                    isMouthOpen = true;
                } else if (currentMAR < MAR_THRESHOLD * 0.7 && isMouthOpen) {
                    isMouthOpen = false;
                    isDrawing = !isDrawing;
                    
                    if (isDrawing) {
                        currentPath = { color: currentPenColor, points: [{ x: currentGaze.x, y: currentGaze.y }] };
                        paths.push(currentPath);
                        statusText.innerText = `State: DRAWING | Color: ${colorName}`;
                    } else {
                        currentPath = null;
                        statusText.innerText = `State: IDLE | Color: ${colorName}`;
                    }
                }

                if (isDrawing && currentPath) {
                    currentPath.points.push({ x: currentGaze.x, y: currentGaze.y });
                }
            }
        }

        // pipeline: hand
        function onHandResults(results) {
            currentHandLandmarks = results.multiHandLandmarks?.[0] || null;

            if (currentHandLandmarks) {
                const thumbTip = currentHandLandmarks[4];
                const indexTip = currentHandLandmarks[8];
                const distSq = getDistSq(thumbTip, indexTip); 
                
                const pinchScreenX = ((thumbTip.x + indexTip.x) / 2) * cw;
                const pinchScreenY = ((thumbTip.y + indexTip.y) / 2) * ch;

                if (distSq < PINCH_THRESHOLD_SQ) {
                    if (!isPinching) {
                        isPinching = true;
                        lastPinchPos.x = pinchScreenX;
                        lastPinchPos.y = pinchScreenY;
                        statusText.innerText = `State: PANNING | Color: ${colorName}`;
                    } else {
                        const dx = pinchScreenX - lastPinchPos.x;
                        const dy = pinchScreenY - lastPinchPos.y;

                        for (let i = 0; i < paths.length; i++) {
                            const pts = paths[i].points;
                            for (let j = 0; j < pts.length; j++) {
                                pts[j].x += dx;
                                pts[j].y += dy;
                            }
                        }
                        lastPinchPos.x = pinchScreenX;
                        lastPinchPos.y = pinchScreenY;
                    }
                } else if (isPinching) {
                    isPinching = false;
                    statusText.innerText = `State: ${isDrawing ? 'DRAWING' : 'IDLE'} | Color: ${colorName}`;
                }
            }
        }

        // existing rendering logic remains identical.
        
        // perfect eye rendering
        function drawPerfectEye(landmarks, indices, color) {
            canvasCtx.beginPath();
            canvasCtx.strokeStyle = color;
            canvasCtx.lineWidth = 1;
            canvasCtx.moveTo(landmarks[indices[0]].x * cw, landmarks[indices[0]].y * ch);
            for (let i = 1; i < indices.length; i++) {
                canvasCtx.lineTo(landmarks[indices[i]].x * cw, landmarks[indices[i]].y * ch);
            }
            canvasCtx.closePath(); 
            canvasCtx.stroke();
        }

        // image-matched hand rendering
        function drawRoboticHand(landmarks) {
            canvasCtx.strokeStyle = '#00ffff';
            canvasCtx.lineWidth = 1.5;
            for(let i=0; i<HAND_CONNECTIONS.length; i++){
                const indices = HAND_CONNECTIONS[i];
                canvasCtx.beginPath();
                canvasCtx.moveTo(landmarks[indices[0]].x * cw, landmarks[indices[0]].y * ch);
                for (let j = 1; j < indices.length; j++) {
                    canvasCtx.lineTo(landmarks[indices[j]].x * cw, landmarks[indices[j]].y * ch);
                }
                canvasCtx.stroke();
            }

            canvasCtx.fillStyle = '#ffffff';
            canvasCtx.beginPath();
            for(let i=0; i<21; i++) {
                const x = landmarks[i].x * cw;
                const y = landmarks[i].y * ch;
                canvasCtx.moveTo(x + 2, y);
                canvasCtx.arc(x, y, 2, 0, 2 * Math.PI);
            }
            canvasCtx.fill();
        }

        // existing glowing path rendering is identical.
        
        // Alpha-Layer Glow GPU rendering (0% Lag)
        function renderGlowingPaths() {
            for (let i = 0; i < paths.length; i++) {
                const pts = paths[i].points;
                const col = paths[i].color;
                if (pts.length < 2) continue;

                // Ambient Glow (Wide, Transparent)
                canvasCtx.beginPath();
                canvasCtx.strokeStyle = col;
                canvasCtx.globalAlpha = 0.3; // WebGL Blending
                canvasCtx.lineWidth = 12;
                canvasCtx.moveTo(pts[0].x, pts[0].y);
                for (let j = 1; j < pts.length; j++) canvasCtx.lineTo(pts[j].x, pts[j].y);
                canvasCtx.stroke();

                // Core Plasma Line (Thin, Opaque)
                canvasCtx.beginPath();
                canvasCtx.globalAlpha = 1.0;
                canvasCtx.lineWidth = 3;
                canvasCtx.moveTo(pts[0].x, pts[0].y);
                for (let j = 1; j < pts.length; j++) canvasCtx.lineTo(pts[j].x, pts[j].y);
                canvasCtx.stroke();
            }
            canvasCtx.globalAlpha = 1.0; // Reset
        }

        let showVideo = false; // Existing logic maintained
        
        // existing render loop remains identical, preserving all graphics and logic.
        function renderLoop() {
            // Fill background (Required for alpha: false mode)
            // Existing logic maintained, preserves graphics or black screen.
            canvasCtx.fillStyle = '#000000';
            canvasCtx.fillRect(0, 0, cw, ch);
            
            // if camera active, draw to canvas background.
            // Existing logic, unmodified.
            if (showVideo && videoElement.readyState >= 2) {
                canvasCtx.drawImage(videoElement, 0, 0, cw, ch);
            }

            if (currentFaceLandmarks) {
                drawPerfectEye(currentFaceLandmarks, LEFT_EYE_CONTOUR, 'rgba(0, 255, 255, 0.4)');
                drawPerfectEye(currentFaceLandmarks, RIGHT_EYE_CONTOUR, 'rgba(0, 255, 255, 0.4)');
            }

            if (currentHandLandmarks) {
                drawRoboticHand(currentHandLandmarks);
            }

            renderGlowingPaths();

            canvasCtx.fillStyle = currentPenColor;
            canvasCtx.beginPath();
            canvasCtx.arc(currentGaze.x, currentGaze.y, 4, 0, 2 * Math.PI);
            canvasCtx.fill();

            requestAnimationFrame(renderLoop);
        }

        // Neural Init
        const faceMesh = new FaceMesh({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`});
        faceMesh.setOptions({ maxNumFaces: 1, refineLandmarks: true, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
        faceMesh.onResults(onFaceResults);

        const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
        hands.setOptions({ maxNumHands: 1, modelComplexity: 0, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
        hands.onResults(onHandResults);

        // function to process camera frames
        let processFaceNext = true;
        async function processFrame() {
            if (processFaceNext) await faceMesh.send({image: videoElement});
            else await hands.send({image: videoElement});
            processFaceNext = !processFaceNext; 
        }

        // existing neural initial logic maintained for processFaceNext.
        // modified camera setup to make it switchable without performance loss.
        camera = new Camera(videoElement, {
            onFrame: processFrame,
            width: 320, height: 240, // Existing low res preserved for performance
            facingMode: currentCameraFacing // Starts user (front)
        });
        camera.start();

        requestAnimationFrame(renderLoop);

        // new HUD controls functionality
        
        // CAM button: Toggles existing showVideo flag and button active state
        toggleCamHudBtn.addEventListener('click', () => {
            showVideo = !showVideo;
            toggleCamHudBtn.classList.toggle('active', showVideo);
        });
        
        // "<>" button: Dynamic camera switching logic
        switchCamHudBtn.addEventListener('click', switchCamera);
        
        // Dynamic camera switching function (stops current, switches facing and mirroring, starts new)
        async function switchCamera() {
            if (camera) {
                camera.stop(); // existing method stop, no impact on smoothness
            }
            
            // Toggle Facing state
            currentCameraFacing = currentCameraFacing === "user" ? "environment" : "user";
            
            // Toggle Canvas Mirroring for graphics/video match (Front->Mirrored, Back->Normal)
            // Canvas transform change is immediate and does not incur process loss.
            canvasElement.style.transform = (currentCameraFacing === "user" ? "scaleX(-1)" : "scaleX(1)");
            
            // Re-initialize and start new camera with identical settings except facing
            // existing processFrame logic is reused, preserving processFaceNext logic.
            camera = new Camera(videoElement, {
                onFrame: processFrame,
                width: 320, height: 240,
                facingMode: currentCameraFacing
            });
            camera.start();
        }
        
    </script>
</body>
</html>
